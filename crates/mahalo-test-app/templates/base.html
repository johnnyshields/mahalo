<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Mahalo Ice Cream{% endblock title %}</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <nav class="nav">
        <div class="nav-content">
            <a href="/" class="nav-logo">🍦 Mahalo Ice Cream</a>
            <div class="nav-links">
                <a href="/">🏠 Home</a>
                <a href="/menu">📋 Menu</a>
                <a href="/order">🛒 Order</a>
                <a href="/about">🌺 About</a>
            </div>
        </div>
    </nav>

    <main>
        {% block content %}{% endblock content %}
    </main>

    <footer class="footer">
        <p>🌴 &copy; 2024 Mahalo Ice Cream Store 🌴 Tropical flavors, island vibes 🤙</p>
    </footer>

    <script src="/static/js/app.js"></script>
    <div class="chat-widget-btn" id="chat-widget-btn">💬</div>
    <div class="chat-widget-panel" id="chat-widget-panel">
        <div class="chat-widget-header">
            <span>🍦 Mahalo Support</span>
            <button class="chat-widget-close" id="chat-widget-close">&times;</button>
        </div>
        <div class="chat-widget-messages" id="chat-widget-messages">
            <div class="chat-message bot">
                <span class="chat-avatar">🍦</span>
                <div class="chat-bubble">Aloha! 🌺 How can I help you today?</div>
            </div>
        </div>
        <div class="chat-widget-input">
            <input type="text" id="chat-widget-input" placeholder="Type a message..." autocomplete="off">
            <button id="chat-widget-send" class="btn btn-small">Send</button>
        </div>
    </div>
</body>
</html>
