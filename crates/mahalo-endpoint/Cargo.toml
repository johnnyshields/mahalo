[package]
name = "mahalo-endpoint"
version = "0.1.0"
edition.workspace = true
license.workspace = true
description = "Axum bridge and supervised server lifecycle for Mahalo"

[dependencies]
mahalo-core = { path = "../mahalo-core" }
mahalo-router = { path = "../mahalo-router" }
mahalo-channel = { path = "../mahalo-channel" }
mahalo-pubsub = { path = "../mahalo-pubsub" }
rebar-core = { workspace = true }
tokio = { workspace = true }
axum = { workspace = true }
http = { workspace = true }
bytes = { workspace = true }
tracing = { workspace = true }
async-trait = { workspace = true }
tower-http = { workspace = true }
futures = { workspace = true }
serde_json = { workspace = true }

[dev-dependencies]
tokio = { version = "1", features = ["full", "test-util"] }
serde_json = { workspace = true }
reqwest = { version = "0.12", features = ["json"] }
